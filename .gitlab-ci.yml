variables:
  CMAKE_GENERATOR: 'Ninja' # default build system
  TARGET_BRANCH: master
  TARGET_REPOSITORY: https://gitlab.cern.ch/gaudi/Gaudi.git

# Job templates
.build: &template_build
  tags:
    - cvmfs
  before_script:
    # Add Ninja and CMake to the PATH
    - export PATH="/cvmfs/sft.cern.ch/lcg/contrib/CMake/3.30.6/Linux-$(uname -m)/bin:/cvmfs/sft.cern.ch/lcg/contrib/ninja/1.12.1/Linux-$(uname -m)/bin:$PATH"
    - export CCACHE_DIR=$PWD/.ccache
    - "export LCG_VERSION=$(cut -d: -f2 <<< $CI_JOB_NAME)"
    - "export platform=$(cut -d: -f3 <<< $CI_JOB_NAME)"
    - "export PRESET=$(cut -d: -f4 <<< $CI_JOB_NAME)"
    - if [ -z "$PRESET" ] ; then PRESET=full ; fi
  script:
    - git clone https://gitlab.cern.ch/lhcb-core/lcg-toolchains.git
    - cmake --version
    - cmake -S . -B build -Wno-dev -DCMAKE_TOOLCHAIN_FILE=lcg-toolchains/LCG_${LCG_VERSION}/${platform}.cmake -DGAUDI_TEST_PUBLIC_HEADERS_BUILD=yes -C ci-utils/preset-${PRESET}.cmake
    - ccache -z
    # build
    - cmake --build build 2>&1 | tee build.log
    - ccache -s
    - cp build/compile_commands.json .
    # run the tests
    - cd build
    - if ctest -T test -j $(nproc) --test-load $(nproc) --repeat until-pass:3 --no-compress-output ; then result=success ; else result=failure ; fi
    - cp Testing/$(head -1 Testing/TAG)/Test.xml ..
    - cd ..
    - xsltproc ci-utils/CTest2JUnit.xslt Test.xml > results.xml
    - echo "Test results can be browsed at https://lhcb-nightlies.web.cern.ch/utils/test_report?url=${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/Test.xml"
    - test "$result" = "success"
    - ( cd build && cpack -G TZST )
    - mv build/Gaudi-*.tar.zst build/install_dirs.sh .
  artifacts:
    paths:
      - build.log
      - compile_commands.json
      - Test.xml
      - Gaudi-*.tar.zst
      - install_dirs.sh
    reports:
      junit:
        - results.xml
    when: always
    expire_in: 1 week
  cache:
    key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - .ccache
      - build/Testing
  interruptible: true

.lhcb_build: &template_lhcb_build
  <<: *template_build
  script:
    - shopt -s expand_aliases
    - . /cvmfs/lhcb.cern.ch/lib/LbEnv
    - cmake --version
    - lb-set-platform $platform
    - lb-project-init --overwrite
    - ccache -z
    - mkdir build.${BINARY_TAG}
    - if [ -e build/Testing ] ; then mv build/Testing build.${BINARY_TAG} ; fi
    # build
    - make 2>&1 | tee build.log
    - ccache -s
    # run the tests
    - if make test ARGS="-j $(nproc) --repeat until-pass:3 --no-compress-output" ; then result=success ; else result=failure ; fi
    - cp build.${BINARY_TAG}/Testing/$(head -1 build.${BINARY_TAG}/Testing/TAG)/Test.xml .
    - mkdir -p build && mv build.${BINARY_TAG}/Testing build
    - cp build.${BINARY_TAG}/compile_commands.json .
    - mv build.${BINARY_TAG}/html .
    - xsltproc ci-utils/CTest2JUnit.xslt Test.xml > results.xml
    - echo "Test results can be browsed at https://lhcb-nightlies.web.cern.ch/utils/test_report?url=${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/Test.xml"
    - test "$result" = "success"
  artifacts:
    paths:
      - build.log
      - compile_commands.json
      - Test.xml
      - html
    reports:
      junit:
        - results.xml
    when: always
    expire_in: 1 week

.lcg_view_build: &template_lcg_view_build
  <<: *template_build
  script:
    - . /cvmfs/sft.cern.ch/lcg/views/LCG_${LCG_VERSION}/${platform}/setup.sh
    - export CONFIGURABLE_DB_IGNORE="/cvmfs/sft.cern.ch/lcg/views/LCG_${LCG_VERSION}/${platform}/lib/Gaudi.confdb,/cvmfs/sft.cern.ch/lcg/views/LCG_${LCG_VERSION}/${platform}/lib/Gaudi.confdb2"
    - cmake --version
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_SCAN_FOR_MODULES=NO -DGAUDI_USE_CUDA=${CUDACXX:+ON}
    - ccache -z
    # build
    - cmake --build build 2>&1 | tee build.log
    - ccache -s
    - cp build/compile_commands.json .
    # run the tests
    - cd build
    - if ctest -T test -j $(nproc) --test-load $(nproc) --repeat until-pass:3 --no-compress-output ; then result=success ; else result=failure ; fi
    - cp Testing/$(head -1 Testing/TAG)/Test.xml ..
    - cd ..
    - xsltproc ci-utils/CTest2JUnit.xslt Test.xml > results.xml
    - echo "Test results can be browsed at https://lhcb-nightlies.web.cern.ch/utils/test_report?url=${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/Test.xml"
    - test "$result" = "success"

.key4hep_nightly_build: &template_key4hep_nightly_build
  <<: *template_build
  script:
    # Source the Key4hep nightly setup
    - . /cvmfs/sft-nightlies.cern.ch/lcg/views/devkey-head/latest/x86_64-el9-gcc14-opt/setup.sh
    - export CONFIGURABLE_DB_IGNORE="/cvmfs/sft-nightlies.cern.ch/lcg/views/devkey-head/latest/x86_64-el9-gcc14-opt/lib/Gaudi.confdb,/cvmfs/sft-nightlies.cern.ch/lcg/views/devkey-head/latest/x86_64-el9-gcc14-opt/lib/Gaudi.confdb2"
    - cmake --version
    # Build Gaudi
    - echo "=== Building Gaudi ==="
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_SCAN_FOR_MODULES=NO -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$PWD/install
    - ccache -z
    - cmake --build build 2>&1 | tee build.log
    - ccache -s
    - cp build/compile_commands.json .
    # Install Gaudi to local prefix and set the environment
    - echo "=== Installing Gaudi ==="
    - cmake --install build
    # (convert relative install paths to absolute)
    - source build/install_dirs.sh
    - for var in CMAKE_INSTALL_BINDIR CMAKE_INSTALL_LIBDIR GAUDI_INSTALL_PYTHONDIR GAUDI_INSTALL_CONFIGDIR ; do
    -     value=$(eval echo '$'${var})
    -     if [ "${value:0:1}" != "/" ] ; then
    -         eval $var=$PWD/install/${value}
    -     fi
    - done
    - export PATH=$CMAKE_INSTALL_BINDIR:$PATH
    - export LD_LIBRARY_PATH=$CMAKE_INSTALL_LIBDIR:$LD_LIBRARY_PATH
    - export PYTHONPATH=$GAUDI_INSTALL_PYTHONDIR:$PYTHONPATH
    - export CMAKE_PREFIX_PATH=$PWD/install:$CMAKE_PREFIX_PATH
    # Build k4FWCore
    - echo "=== Building k4FWCore ==="
    - git clone --depth 1 --branch main https://github.com/key4hep/k4FWCore
    - cmake -S k4FWCore -B k4fwcore_build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$PWD/install -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_SCAN_FOR_MODULES=NO 2>&1 | tee -a build.log
    - cmake --build k4fwcore_build 2>&1 | tee -a build.log
    # Run k4FWCore tests
    - echo "=== Running k4FWCore tests ==="
    - cd k4fwcore_build
    - if ctest -T test -j $(nproc) --test-load $(nproc) --no-compress-output ; then result=success ; else result=failure ; fi
    - cp Testing/$(head -1 Testing/TAG)/Test.xml ..
    - cd ..
    - xsltproc ci-utils/CTest2JUnit.xslt Test.xml > results.xml
    - echo "Test results can be browsed at https://lhcb-nightlies.web.cern.ch/utils/test_report?url=${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/Test.xml"
    - test "$result" = "success"
  artifacts:
    paths:
      - build.log
      - compile_commands.json
      - Test.xml
    reports:
      junit:
        - results.xml
    when: always
    expire_in: 1 week

.warnings-check: &template_warnings_check
  image: gitlab-registry.cern.ch/linuxsupport/alma9-base:latest
  variables:
    LOG: build.log
  script:
    - ci-utils/build-check ${LOG}
  allow_failure: true
  interruptible: true


