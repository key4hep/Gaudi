pre-commit-checks:
  image: registry.cern.ch/docker.io/library/python:3.9
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  before_script:
    - |
      set -x
      python -m venv ${CI_PROJECT_DIR}/.cache/pre-commit-venv
      . ${CI_PROJECT_DIR}/.cache/pre-commit-venv/bin/activate
      pip install pre-commit
      git fetch $TARGET_REPOSITORY $TARGET_BRANCH
      git config user.name "Gitlab CI"
      git config user.email "noreply@cern.ch"
  script:
    - |
      if ! pre-commit run --show-diff-on-failure --from-ref FETCH_HEAD --to-ref HEAD ; then
        echo ""
        echo "Generating patch file..."
        git commit -a -m "pre-commit fixes

      patch generated by ${CI_JOB_URL}" > /dev/null
        git format-patch HEAD~
        cat <<EOF
      =======================================
       You can apply these changes with:

          curl ${CI_JOB_URL}/artifacts/raw/0001-pre-commit-fixes.patch | git am

      =======================================
      EOF
        exit 1
      fi
  artifacts:
    paths:
      - 0001-pre-commit-fixes.patch
    when: on_failure
    expire_in: 1 week
  interruptible: true

### Documentation
website:
  image: registry.cern.ch/docker.io/library/python:3.9
  script:
    - rm -rf public
    - mkdir -p public
    - cd docs
    - pip install -r source/requirements.txt
    - make html
    - cp -a build/html/. ../public/.
  artifacts:
    paths:
      - public
    expire_in: 1 day

doxygen:107:x86_64-el9-gcc14-opt:
  <<: *template_build
  image: gitlab-registry.cern.ch/lhcb-docker/os-base/alma9-devel:latest
  script:
    - . /cvmfs/sft.cern.ch/lcg/views/LCG_${LCG_VERSION}/${platform}/setup.sh
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
    - cmake --build build --target doc
    - rm -rf public
    - mkdir -p public/doxygen
    - cp -r GaudiRelease/web_helpers/. public/doxygen/.
    - mv build/doxygen/html ${CI_COMMIT_REF_SLUG}
    - zip -r -q public/doxygen/${CI_COMMIT_REF_SLUG}.zip ${CI_COMMIT_REF_SLUG}
  artifacts:
    paths:
      - public
    expire_in: 1 day

# see https://gitlab.cern.ch/gitlabci-examples/deploy_eos for the details
# of the configuration
deploy-website:
  needs:
    - job: "website"
      artifacts: true
    - job: "doxygen:107:x86_64-el9-gcc14-opt"
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
  image: gitlab-registry.cern.ch/ci-tools/ci-web-deployer:latest
  script:
    - test -z "$EOS_ACCOUNT_USERNAME" -o -z "$EOS_ACCOUNT_PASSWORD" -o -z "$EOS_PATH" && exit 0 || true
    # Script that performs the deploy to EOS. Makes use of the variables defined in the project
    # It will copy the generated content to the folder in EOS
    - export CI_OUTPUT_DIR=public/
    - deploy-eos
  # do not run any globally defined before_script or after_script for this step
  before_script: []
  after_script: []


### Tests for CMake configuration

cmake-toolbox:105c:x86_64-el9-gcc13-opt:
  <<: *template_build
  image: gitlab-registry.cern.ch/lhcb-docker/os-base/alma9-devel:latest
  script:
    - export PROJECT=dummyProject
    - export SOURCE_DIR=$PWD/cmake/tests/$PROJECT
    - export BUILD_DIR=$PWD/build-$PROJECT
    - export INSTALL_PREFIX=$PWD/opt/$PROJECT
    # ensure pytest extensions are available
    - export PYTHONPATH=$PWD/GaudiPolicy/python
    # Get LHCb toolchain helpers
    - git clone https://gitlab.cern.ch/lhcb-core/lcg-toolchains.git
    - cmake --version
    # configure
    - cmake -S $SOURCE_DIR -B $BUILD_DIR -Wno-dev -DCMAKE_TOOLCHAIN_FILE=$PWD/lcg-toolchains/LCG_${LCG_VERSION}/${platform}.cmake -DGAUDI_TEST_PUBLIC_HEADERS_BUILD=yes -DBUILD_TESTING=yes
    # build
    - cmake --build $BUILD_DIR
    # run tests
    - cmake --build $BUILD_DIR --target test
    # test build products
    - test -x $BUILD_DIR/qux
    - $BUILD_DIR/qux
    - test -x $BUILD_DIR/run
    - $BUILD_DIR/run $BUILD_DIR/qux
    # test build/test environment
    - "$BUILD_DIR/run printenv PATH | tr : '\\n' | grep -F $BUILD_DIR"
    - "$BUILD_DIR/run printenv LD_LIBRARY_PATH | tr : '\\n' | grep -F $BUILD_DIR"
    - "$BUILD_DIR/run printenv PYTHONPATH | tr : '\\n' | grep -F $SOURCE_DIR/python"
    - "$BUILD_DIR/run printenv PATH | tr : '\\n' | grep -F $SOURCE_DIR/scripts"
    - test $($BUILD_DIR/run printenv ENV_PROJECT_SOURCE_DIR) == $SOURCE_DIR
    - test $($BUILD_DIR/run printenv ENV_PROJECT_BINARY_DIR) == $BUILD_DIR
    # install
    - cmake --install $BUILD_DIR --prefix $INSTALL_PREFIX
    # test install layout
    - source $BUILD_DIR/install_dirs.sh
    # (convert relative install paths to absolute)
    - for var in CMAKE_INSTALL_BINDIR CMAKE_INSTALL_LIBDIR CMAKE_INSTALL_INCLUDEDIR GAUDI_INSTALL_PLUGINDIR GAUDI_INSTALL_PYTHONDIR GAUDI_INSTALL_CONFIGDIR ; do
    -     value=$(eval echo '$'${var})
    -     if [ "${value:0:1}" != "/" ] ; then
    -         eval $var=$INSTALL_PREFIX/${value}
    -     fi
    - done
    - test -d $INSTALL_PREFIX
    - test -e $CMAKE_INSTALL_LIBDIR/libfoo.so
    - test -e $GAUDI_INSTALL_PLUGINDIR/libbar.so
    - test -e $GAUDI_INSTALL_PLUGINDIR/FooBar.components
    - test -e $CMAKE_INSTALL_LIBDIR/libbaz.so
    - test -x $CMAKE_INSTALL_BINDIR/qux
    - test -e $CMAKE_INSTALL_INCLUDEDIR/baz.hpp
    - test -e $CMAKE_INSTALL_INCLUDEDIR/FOOBAR_VERSION.h
    - test -e $GAUDI_INSTALL_PYTHONDIR/dummyProject/dummyModule.py
    - test -x $CMAKE_INSTALL_BINDIR/dummyRun.py
    - test -e $GAUDI_INSTALL_CONFIGDIR/SomeCustomModule.cmake
    - export PATH=$CMAKE_INSTALL_BINDIR:$PATH
    - export LD_LIBRARY_PATH=$CMAKE_INSTALL_LIBDIR:$GAUDI_INSTALL_PLUGINDIR:$LD_LIBRARY_PATH
    - export PYTHONPATH=$GAUDI_INSTALL_PYTHONDIR:$PYTHONPATH
    - rm -rf $BUILD_DIR
    - qux
    - dummyRun.py
  artifacts: {}
  cache: {}

